version: '3.9'

networks:
  smart-kisan-net:
    driver: bridge

volumes:
  redis-data:
  kafka-data:
  zookeeper-data:

services:
  # ─── Infrastructure ───────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sk-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - smart-kisan-net
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: sk-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - smart-kisan-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: sk-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - smart-kisan-net

  # ─── API Gateway ──────────────────────────────────
  gateway:
    image: amit8959/sk-gateway:latest
    container_name: sk-gateway
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET}
      - MONGODB_URI=${MONGODB_URI}
      - AUTH_SERVICE_URL=http://auth-service:5001
      - USER_SERVICE_URL=http://user-service:5002
      - WEATHER_SERVICE_URL=http://weather-service:5003
      - CROP_SERVICE_URL=http://crop-service:5004
      - FERTILIZER_SERVICE_URL=http://fertilizer-service:5005
      - MARKET_SERVICE_URL=http://market-service:5006
      - LABOUR_SERVICE_URL=http://labour-service:5007
      - CHATBOT_SERVICE_URL=http://chatbot-service:5008
      - NEWS_SERVICE_URL=http://news-service:5009
      - PAYMENT_SERVICE_URL=http://payment-service:5010
      - CLERK_PUBLISHABLE_KEY=${CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - smart-kisan-net

  # ─── Frontend ─────────────────────────────────────
  frontend:
    image: amit8959/sk-frontend:latest
    container_name: sk-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - gateway
    networks:
      - smart-kisan-net

  # ─── Microservices ────────────────────────────────
  auth-service:
    image: amit8959/sk-auth:latest
    container_name: sk-auth
    restart: unless-stopped
    environment:
      - PORT=5001
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
    networks:
      - smart-kisan-net

  user-service:
    image: amit8959/sk-user:latest
    container_name: sk-user
    restart: unless-stopped
    environment:
      - PORT=5002
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - smart-kisan-net

  weather-service:
    image: amit8959/sk-weather:latest
    container_name: sk-weather
    restart: unless-stopped
    environment:
      - PORT=5003
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKER=kafka:29092
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - smart-kisan-net

  crop-service:
    image: amit8959/sk-crop:latest
    container_name: sk-crop
    restart: unless-stopped
    environment:
      - PORT=5004
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MONGODB_URI=${MONGODB_URI}
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKER=kafka:29092
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - smart-kisan-net

  fertilizer-service:
    image: amit8959/sk-fertilizer:latest
    container_name: sk-fertilizer
    restart: unless-stopped
    environment:
      - PORT=5005
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - smart-kisan-net

  market-service:
    image: amit8959/sk-market:latest
    container_name: sk-market
    restart: unless-stopped
    environment:
      - PORT=5006
      - MONGODB_URI=${MONGODB_URI}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - smart-kisan-net

  labour-service:
    image: amit8959/sk-labour:latest
    container_name: sk-labour
    restart: unless-stopped
    environment:
      - PORT=5007
      - MONGODB_URI=${MONGODB_URI}
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKER=kafka:29092
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - smart-kisan-net

  chatbot-service:
    image: amit8959/sk-chatbot:latest
    container_name: sk-chatbot
    restart: unless-stopped
    environment:
      - PORT=5008
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - smart-kisan-net

  news-service:
    image: amit8959/sk-news:latest
    container_name: sk-news
    restart: unless-stopped
    environment:
      - PORT=5009
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - smart-kisan-net

  payment-service:
    image: amit8959/sk-payment:latest
    container_name: sk-payment
    restart: unless-stopped
    environment:
      - PORT=5010
      - JWT_SECRET=${JWT_SECRET}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
    networks:
      - smart-kisan-net
