services:
  redis:
    image: redis:7-alpine
    container_name: sk-redis
    restart: unless-stopped
    networks: [sk-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build: ./gateway
    container_name: sk-gateway
    restart: unless-stopped
    ports: ["5000:5000"]
    env_file: .env.prod
    environment:
      - AUTH_SERVICE_URL=http://sk-auth:5001
      - USER_SERVICE_URL=http://sk-user:5002
      - WEATHER_SERVICE_URL=http://sk-weather:5003
      - CROP_SERVICE_URL=http://sk-crop:5004
      - FERTILIZER_SERVICE_URL=http://sk-fertilizer:5005
      - MARKET_SERVICE_URL=http://sk-market:5006
      - LABOUR_SERVICE_URL=http://sk-labour:5007
      - CHATBOT_SERVICE_URL=http://sk-chatbot:5008
      - NEWS_SERVICE_URL=http://sk-news:5009
      - PAYMENT_SERVICE_URL=http://sk-payment:5010
      - SCHEMES_SERVICE_URL=http://sk-schemes:5011
    networks: [sk-net]
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_CLERK_PUBLISHABLE_KEY: pk_test_Z3JhbmQtcm9kZW50LTI5LmNsZXJrLmFjY291bnRzLmRldiQ
    container_name: sk-frontend
    restart: unless-stopped
    ports: ["80:80"]
    networks: [sk-net]
    depends_on: [gateway]

  auth-service:
    build: ./services/auth-service
    container_name: sk-auth
    env_file: .env.prod
    environment: [PORT=5001]
    networks: [sk-net]

  user-service:
    build: ./services/user-service
    container_name: sk-user
    env_file: .env.prod
    environment: [PORT=5002]
    networks: [sk-net]

  weather-service:
    build: ./services/weather-service
    container_name: sk-weather
    env_file: .env.prod
    environment: [PORT=5003]
    networks: [sk-net]

  crop-service:
    build: ./services/crop-service
    container_name: sk-crop
    env_file: .env.prod
    environment: [PORT=5004]
    networks: [sk-net]

  fertilizer-service:
    build: ./services/fertilizer-service
    container_name: sk-fertilizer
    env_file: .env.prod
    environment: [PORT=5005]
    networks: [sk-net]

  market-service:
    build: ./services/market-service
    container_name: sk-market
    env_file: .env.prod
    environment: [PORT=5006]
    networks: [sk-net]

  labour-service:
    build: ./services/labour-service
    container_name: sk-labour
    env_file: .env.prod
    environment: [PORT=5007]
    networks: [sk-net]

  chatbot-service:
    build: ./services/chatbot-service
    container_name: sk-chatbot
    env_file: .env.prod
    environment: [PORT=5008]
    networks: [sk-net]

  news-service:
    build: ./services/news-service
    container_name: sk-news
    env_file: .env.prod
    environment: [PORT=5009]
    networks: [sk-net]

  payment-service:
    build: ./services/payment-service
    container_name: sk-payment
    env_file: .env.prod
    environment: [PORT=5010]
    networks: [sk-net]

  schemes-service:
    build: ./services/schemes-service
    container_name: sk-schemes
    env_file: .env.prod
    environment: [PORT=5011]
    networks: [sk-net]

networks:
  sk-net:
    driver: bridge
