version: '3.9'

networks:
  smart-kisan-net:
    driver: bridge

volumes:
  mongo-data:
  redis-data:

services:
  # ─── Infrastructure ───────────────────────────────
  mongodb:
    image: mongo:7
    container_name: sk-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - smart-kisan-net
    environment:
      MONGO_INITDB_DATABASE: smart-kisan
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sk-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - smart-kisan-net
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── API Gateway ──────────────────────────────────
  gateway:
    build: ./gateway
    container_name: sk-gateway
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET}
      - AUTH_SERVICE_URL=http://auth-service:5001
      - USER_SERVICE_URL=http://user-service:5002
      - WEATHER_SERVICE_URL=http://weather-service:5003
      - CROP_SERVICE_URL=http://crop-service:5004
      - FERTILIZER_SERVICE_URL=http://fertilizer-service:5005
      - MARKET_SERVICE_URL=http://market-service:5006
      - LABOUR_SERVICE_URL=http://labour-service:5007
      - CHATBOT_SERVICE_URL=http://chatbot-service:5008
      - NEWS_SERVICE_URL=http://news-service:5009
      - PAYMENT_SERVICE_URL=http://payment-service:5010
      - SCHEMES_SERVICE_URL=http://schemes-service:5011
      - CLERK_PUBLISHABLE_KEY=${CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
    networks:
      - smart-kisan-net

  # ─── Frontend ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_BASE_URL=http://localhost:5000/api
        - VITE_CLERK_PUBLISHABLE_KEY=${CLERK_PUBLISHABLE_KEY}
        - VITE_GOOGLE_MAPS_API_KEY=${VITE_GOOGLE_MAPS_API_KEY}
    container_name: sk-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - gateway
    networks:
      - smart-kisan-net

  # ─── Microservices ────────────────────────────────
  auth-service:
    build: ./services/auth-service
    container_name: sk-auth
    restart: unless-stopped
    environment:
      - PORT=5001
      - MONGODB_URI=mongodb://mongodb:27017/smart-kisan
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - smart-kisan-net

  user-service:
    build: ./services/user-service
    container_name: sk-user
    restart: unless-stopped
    environment:
      - PORT=5002
      - MONGODB_URI=mongodb://mongodb:27017/smart-kisan
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smart-kisan-net

  weather-service:
    build: ./services/weather-service
    container_name: sk-weather
    restart: unless-stopped
    environment:
      - PORT=5003
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - smart-kisan-net

  crop-service:
    build: ./services/crop-service
    container_name: sk-crop
    restart: unless-stopped
    environment:
      - PORT=5004
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MONGODB_URI=mongodb://mongodb:27017/smart-kisan
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smart-kisan-net

  fertilizer-service:
    build: ./services/fertilizer-service
    container_name: sk-fertilizer
    restart: unless-stopped
    environment:
      - PORT=5005
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - smart-kisan-net

  market-service:
    build: ./services/market-service
    container_name: sk-market
    restart: unless-stopped
    environment:
      - PORT=5006
      - MONGODB_URI=mongodb://mongodb:27017/smart-kisan
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smart-kisan-net

  labour-service:
    build: ./services/labour-service
    container_name: sk-labour
    restart: unless-stopped
    environment:
      - PORT=5007
      - MONGODB_URI=mongodb://mongodb:27017/smart-kisan
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smart-kisan-net

  chatbot-service:
    build: ./services/chatbot-service
    container_name: sk-chatbot
    restart: unless-stopped
    environment:
      - PORT=5008
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - smart-kisan-net

  news-service:
    build: ./services/news-service
    container_name: sk-news
    restart: unless-stopped
    environment:
      - PORT=5009
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - smart-kisan-net

  payment-service:
    build: ./services/payment-service
    container_name: sk-payment
    restart: unless-stopped
    environment:
      - PORT=5010
      - JWT_SECRET=${JWT_SECRET}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
    networks:
      - smart-kisan-net

  schemes-service:
    build: ./services/schemes-service
    container_name: sk-schemes
    restart: unless-stopped
    environment:
      - PORT=5011
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - smart-kisan-net
