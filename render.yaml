        value: rediss://default:gQAAAAAAAcH_AAIgcDFmZGVmNjgzOTMyNDM0YWFkOWU2NTE0ZDE5MGQ0MTE4Mg@superb-caiman-115199.upstash.io:6379
      - key: MOCK_REDIS_KAFKA
        value: "false"

  # 4. News Service
