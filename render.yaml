services:
  # Single unified server — all services in one process
  - type: web
    name: smart-kisan-gateway
    env: node
    plan: free
    buildCommand: npm install && npm install --prefix gateway && npm install --prefix services/auth-service && npm install --prefix services/user-service && npm install --prefix services/weather-service && npm install --prefix services/crop-service && npm install --prefix services/fertilizer-service && npm install --prefix services/market-service && npm install --prefix services/labour-service && npm install --prefix services/chatbot-service && npm install --prefix services/payment-service && npm install --prefix services/schemes-service && npm install --prefix services/news-service
    startCommand: node unified-server.js
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
