services:
  # 🔐 Auth Hub
  - type: web
    name: smart-kisan-auth
    env: node
    buildCommand: npm install
    startCommand: node auth-hub.js
    envVars:
      - key: MONGODB_URI
        sync: false

  # 🤖 AI Hub
  - type: web
    name: smart-kisan-ai
    env: node
    buildCommand: npm install
    startCommand: node ai-hub.js
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  # 📊 Info Hub
  - type: web
    name: smart-kisan-info
    env: node
    buildCommand: npm install
    startCommand: node info-hub.js
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false

  # 💼 Business Hub
  - type: web
    name: smart-kisan-business
    env: node
    buildCommand: npm install
    startCommand: node business-hub.js
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
